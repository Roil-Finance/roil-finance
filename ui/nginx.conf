# =============================================================================
# Canton Rebalancer — Frontend Nginx Configuration
# =============================================================================
# SPA routing: serves index.html for all routes not matching a static file.
# Proxies /api requests to the backend service.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Static assets — long cache for hashed files
    # -------------------------------------------------------------------------

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # API proxy — forward to the backend service
    # -------------------------------------------------------------------------
    # In Docker Compose, the backend service is named "rebalancer-backend".
    # For local dev, Vite handles this proxy (see vite.config.ts).

    location /api/ {
        proxy_pass http://rebalancer-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # SPA fallback — all other routes serve index.html
    # -------------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Deny access to hidden files
    # -------------------------------------------------------------------------

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
