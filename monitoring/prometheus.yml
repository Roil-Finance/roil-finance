# Prometheus configuration for Canton Rebalancer
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'canton-rebalancer-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rebalancer-backend:3001']
        labels:
          service: 'rebalancer-backend'
          network: 'canton'

  - job_name: 'canton-rebalancer-nginx'
    metrics_path: '/stub_status'
    static_configs:
      - targets: ['rebalancer-frontend:8080']
        labels:
          service: 'rebalancer-frontend'
