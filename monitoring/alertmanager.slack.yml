# Alertmanager config for Roil with Slack delivery.
#
# This is a TEMPLATE. Replace __SLACK_WEBHOOK_URL__ with your real webhook
# and rename to alertmanager.yml. One-liner:
#
#   sed "s|__SLACK_WEBHOOK_URL__|$ALERTMANAGER_SLACK_WEBHOOK_URL|" \
#     /root/monitoring/alertmanager.slack.yml > /root/monitoring/alertmanager.yml
#   docker restart roil-alertmanager
#
# The webhook lives at https://hooks.slack.com/services/T…/B…/X…

global:
  resolve_timeout: 5m
  slack_api_url: '__SLACK_WEBHOOK_URL__'

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'component']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 1h
      continue: true
    - match:
        severity: warning
      receiver: 'slack-default'

receivers:
  - name: 'slack-default'
    slack_configs:
      - channel: '#roil-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Component:* {{ .Labels.component }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - channel: '#roil-alerts'
        send_resolved: true
        title: ':rotating_light: CRITICAL — {{ .GroupLabels.alertname }}'
        text: |-
          <!channel>
          {{ range .Alerts }}
          *Component:* {{ .Labels.component }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
      alertname: 'RoilBackendDown'
    target_match_re:
      severity: 'warning'
      component: 'backend'
    equal: ['component']
