        Requires manual resume via /api/admin/resume.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Security incident detected"
      responses:
        '200':
          description: Platform frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
