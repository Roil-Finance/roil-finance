      responses:
        '200':
          description: Platform status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AdminStatus'
        '403':
          description: Not an admin party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/pause:
    post:
      tags: [Admin]
      summary: Pause all rebalancing and DCA globally
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Scheduled maintenance"
      responses:
        '200':
          description: Platform paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Not an admin party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/resume:
    post:
      tags: [Admin]
      summary: Resume all operations
      responses:
        '200':
          description: Platform resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Not an admin party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/fee-rate:
    put:
      tags: [Admin]
      summary: Update platform fee rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feeRate]
              properties:
                feeRate:
                  type: number
                  minimum: 0
                  maximum: 0.1
                  example: 0.001
      responses:
        '200':
          description: Fee rate updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid fee rate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/allowed-assets:
    put:
      tags: [Admin]
      summary: Update allowed asset list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assets]
              properties:
                assets:
                  type: array
                  items:
                    type: string
                  example: ["CC", "USDCx", "CBTC", "ETHx"]
      responses:
        '200':
          description: Allowed assets updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
