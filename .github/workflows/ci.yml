name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_TOOL_OPTIONS: "-Duser.language=en -Duser.country=US"

jobs:
  daml-build-test:
    name: Daml Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build contracts
        run: cd main && daml build

      - name: Run tests
        run: cd test && daml build && daml test

      - name: Upload DAR
        uses: actions/upload-artifact@v4
        with:
          name: canton-rebalancer-dar
          path: main/.daml/dist/canton-rebalancer-0.1.0.dar

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-npm-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-npm-

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Security audit
        run: npm audit --audit-level=high

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-npm-

      - run: npm ci
      - run: npm run build
      - name: Type check
        run: npx tsc --noEmit
      - name: Run frontend tests
        run: npx vitest run
        working-directory: ui
      - name: Security audit
        run: npm audit --audit-level=high
      # E2E tests require a running application
      # To run locally: cd ui && npx playwright test
      # To add to CI, use: npx playwright install --with-deps && npm run test:e2e

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t canton-rebalancer-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t canton-rebalancer-frontend:ci ./ui
